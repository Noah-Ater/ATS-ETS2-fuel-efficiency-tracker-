<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Computer — Fuel Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0c0f;
    --panel:#14181d;
    --panel-alt:#191e24;
    --border:#262c34;
    --border-lit:#333b45;
    --text:#e8ecef;
    --text-dim:#7d8794;
    --text-faint:#4d5561;
    --danger:#e5484d;
    --success:#3dd68c;
    --ats:#e8a33d;
    --ats-dim:#4a3a1e;
    --ets2:#3fc7c0;
    --ets2-dim:#1c3a38;
    --accent: var(--ats);
    --accent-dim: var(--ats-dim);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:
      radial-gradient(ellipse 1200px 600px at 50% -10%, rgba(232,163,61,0.06), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      var(--void);
    color:var(--text);
    font-family:'Barlow Condensed', sans-serif;
    min-height:100vh;
    padding:28px 20px 80px;
    transition:background 0.4s ease;
  }

  .wrap{max-width:1080px; margin:0 auto;}

  /* ---------- HEADER ---------- */
  header{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom:22px; flex-wrap:wrap; gap:14px;
    border-bottom:1px solid var(--border); padding-bottom:18px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px; height:38px; border-radius:6px;
    background:linear-gradient(135deg, var(--accent), transparent);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:13px;
    color:var(--void); box-shadow:0 0 18px -4px var(--accent);
    transition:all 0.4s ease;
  }
  .brand h1{
    font-size:26px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    line-height:1;
  }
  .version-tag{
    font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500;
    color:var(--text-faint); text-transform:none; letter-spacing:0.5px;
    border:1px solid var(--border-lit); border-radius:5px; padding:2px 7px;
    vertical-align:middle; margin-left:6px; position:relative; top:-2px;
  }
  .brand p{
    font-size:13px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase;
    margin-top:3px; font-weight:500;
  }

  /* ---------- TAB SWITCH (rocker style) ---------- */
  .tabbar{
    display:flex; background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:4px; gap:4px;
  }
  .tabbar button{
    font-family:'Barlow Condensed', sans-serif; font-weight:600; font-size:15px;
    letter-spacing:1px; text-transform:uppercase;
    background:transparent; border:none; color:var(--text-dim);
    padding:9px 20px; border-radius:6px; cursor:pointer;
    transition:all 0.2s ease; position:relative;
  }
  .tabbar button.active{
    background:var(--accent); color:#0a0c0f;
    box-shadow:0 0 16px -2px var(--accent);
  }
  .tabbar button:not(.active):hover{ color:var(--text); }

  /* ---------- PANEL ---------- */
  .panel{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:20px; margin-bottom:18px;
  }
  .panel-title{
    font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-dim); font-weight:600; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .panel-title .dot{width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);}

  /* ---------- TRIP COMPUTER / KPI STRIP ---------- */
  .kpi-strip{
    display:grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap:1px;
    background:var(--border); border:1px solid var(--border); border-radius:10px;
    overflow:hidden; margin-bottom:18px;
  }
  .kpi{ background:var(--panel-alt); padding:16px 18px; }
  .kpi .label{
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-faint);
    font-weight:600; margin-bottom:8px;
  }
  .kpi .value-row{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .kpi .lcd{
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:30px;
    color:var(--accent); text-shadow:0 0 14px var(--accent-dim2, transparent);
    letter-spacing:0.5px;
  }
  .kpi .unit{ font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--text-dim); }
  .kpi.hero .lcd{ font-size:38px; }
  .kpi .sub{ font-family:'JetBrains Mono', monospace; font-size:16px; color:var(--text); font-weight:500;}

  .badge{
    font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700;
    padding:3px 8px; border-radius:5px; letter-spacing:0.3px;
    display:inline-flex; align-items:center; gap:4px; white-space:nowrap;
  }
  .badge.up{ background:rgba(61,214,140,0.12); color:var(--success); border:1px solid rgba(61,214,140,0.3);}
  .badge.down{ background:rgba(229,72,77,0.12); color:var(--danger); border:1px solid rgba(229,72,77,0.3);}
  .badge.flat{ background:rgba(125,135,148,0.12); color:var(--text-dim); border:1px solid var(--border-lit);}

  /* ---------- CHART ---------- */
  .chart-wrap{ height:260px; position:relative; }
  .empty-state{
    height:260px; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px; color:var(--text-faint);
  }
  .empty-state svg{ opacity:0.35; }
  .empty-state span{ font-size:14px; letter-spacing:1px; text-transform:uppercase; }

  /* ---------- FLEET TAG FILTER ---------- */
  .tag-filter-row{
    display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px;
  }
  .tag-pill{
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:500;
    letter-spacing:0.3px; padding:5px 12px; border-radius:20px; cursor:pointer;
    background:transparent; border:1px solid var(--border-lit); color:var(--text-dim);
    transition:all 0.15s ease;
  }
  .tag-pill:hover{ border-color:var(--accent); color:var(--text); }
  .tag-pill.active{
    background:var(--accent); border-color:var(--accent); color:#0a0c0f; font-weight:700;
  }

  .optional-tag{
    color:var(--text-faint); font-weight:500; letter-spacing:0.3px; text-transform:none;
    font-size:11px;
  }

  .log-tag{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size:10px;
    color:var(--accent); background:rgba(255,255,255,0.04); border:1px solid var(--border-lit);
    border-radius:4px; padding:1px 6px; margin-left:8px; letter-spacing:0.3px;
  }
  .log-ton{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-dim);
    margin-top:3px; letter-spacing:0.2px;
  }

  /* Mass unit toggle — sits in the suffix position, clickable on ATS only */
  .mass-unit-toggle{
    flex-shrink:0;
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600;
    letter-spacing:0.5px; color:var(--text-dim); background:var(--panel);
    border:1px solid var(--border-lit); border-radius:5px;
    padding:0 10px; cursor:pointer; transition:all 0.15s ease;
    user-select:none; white-space:nowrap;
  }
  .mass-unit-toggle:hover{ border-color:var(--accent); color:var(--accent); }
  .mass-unit-toggle.lbs-active{ color:var(--accent); border-color:var(--accent); background:rgba(255,255,255,0.03); }
  .mass-unit-toggle[disabled]{ cursor:default; pointer-events:none; opacity:0.5; }
  .mass-input-row{ display:flex; gap:6px; align-items:stretch; }

  /* ---------- FORM + HISTORY GRID ---------- */
  .grid2{ display:grid; grid-template-columns: 340px 1fr; gap:18px; align-items:start; }
  @media (max-width:760px){ .grid2{ grid-template-columns:1fr; } }

  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-dim); font-weight:600; margin-bottom:7px;
  }
  .field .input-row{ position:relative; }
  .field input{
    width:100%; background:var(--void); border:1px solid var(--border);
    border-radius:7px; padding:11px 44px 11px 13px; color:var(--text);
    font-family:'JetBrains Mono', monospace; font-size:16px; font-weight:500;
    outline:none; transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  .field .suffix{
    position:absolute; right:13px; top:50%; transform:translateY(-50%);
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text-faint);
    letter-spacing:0.5px; pointer-events:none;
  }

  .submit-btn{
    width:100%; background:var(--accent); color:#0a0c0f; border:none;
    font-family:'Barlow Condensed', sans-serif; font-weight:700; font-size:16px;
    letter-spacing:1.5px; text-transform:uppercase; padding:13px; border-radius:7px;
    cursor:pointer; transition:filter 0.15s ease, box-shadow 0.15s ease; margin-top:4px;
    box-shadow:0 4px 14px -4px var(--accent);
  }
  .submit-btn:hover{ filter:brightness(1.08); }
  .submit-btn:active{ filter:brightness(0.94); }

  /*
   * FORM LAYOUT CONSTRAINT (v1.36.4) — READ BEFORE ADDING FORM FIELDS
   * Interactive elements (buttons) inside #jobForm must NEVER use
   * position:absolute — this has twice caused the submit button to be
   * silently obscured, making it appear broken with no error output.
   * All new fields must follow the .mass-input-row flex pattern.
   * Read-only .suffix spans may use position:absolute within .input-row.
   */

  .preview{
    margin-top:16px; padding:12px 14px; background:var(--void); border:1px dashed var(--border-lit);
    border-radius:8px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--text-dim);
    display:flex; justify-content:space-between; align-items:center;
  }
  .preview .big{ color:var(--accent); font-size:18px; font-weight:700; }

  /* ---------- HISTORY LOG ---------- */
  .log{ max-height:420px; overflow-y:auto; padding-right:4px; }
  .log::-webkit-scrollbar{ width:6px; }
  .log::-webkit-scrollbar-thumb{ background:var(--border-lit); border-radius:3px; }

  .log-row{
    display:grid; grid-template-columns: 90px 1fr auto auto; gap:14px; align-items:center;
    padding:12px 10px; border-bottom:1px solid var(--border);
    font-family:'JetBrains Mono', monospace;
  }
  .log-row:last-child{ border-bottom:none; }
  .log-row .idx{ color:var(--text-faint); font-size:12px; }
  .log-row .raw{ color:var(--text-dim); font-size:13px; }
  .log-row .eff{ font-size:17px; font-weight:700; color:var(--text); text-align:right; }
  .log-empty{
    padding:40px 10px; text-align:center; color:var(--text-faint);
    font-family:'Barlow Condensed', sans-serif; letter-spacing:1px; text-transform:uppercase; font-size:14px;
  }

  .footer-note{
    text-align:center; color:var(--text-faint); font-size:12px; letter-spacing:0.5px;
    margin-top:24px; font-family:'JetBrains Mono', monospace;
  }

  .clear-btn{
    background:transparent; border:1px solid var(--border-lit); color:var(--text-faint);
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:1px;
    padding:6px 10px; border-radius:6px; cursor:pointer; text-transform:uppercase;
    transition:all 0.15s ease;
  }
  .clear-btn:hover{ border-color:var(--danger); color:var(--danger); }

  .export-btn{
    background:transparent; border:1px solid var(--border-lit); color:var(--text-dim);
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:1px;
    padding:6px 10px; border-radius:6px; cursor:pointer; text-transform:uppercase;
    transition:all 0.15s ease;
  }
  .export-btn:hover{ border-color:var(--accent); color:var(--accent); }

  .header-actions{ display:flex; gap:8px; }

  .panel-header-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

  .error-banner{
    display:none; background:rgba(229,72,77,0.1); border:1px solid var(--danger);
    border-radius:10px; padding:14px 16px; margin-bottom:18px;
    font-family:'JetBrains Mono', monospace; font-size:13px; color:#ffb3b5;
  }
  .error-banner.show{ display:block; }
  .error-banner .eb-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
    font-family:'Barlow Condensed', sans-serif; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; color:var(--danger); font-size:14px;
  }
  .error-banner .eb-msg{ white-space:pre-wrap; word-break:break-word; line-height:1.5; }
  .error-banner button{
    background:transparent; border:1px solid var(--danger); color:var(--danger);
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5px;
    padding:5px 10px; border-radius:6px; cursor:pointer; text-transform:uppercase;
  }
  .error-banner button:hover{ background:rgba(229,72,77,0.15); }
  .eb-actions{ display:flex; gap:8px; }

  .error-banner.success{ background:rgba(61,214,140,0.1); border-color:var(--success); color:#a8f0d1; }
  .error-banner.success .eb-head{ color:var(--success); }
  .error-banner.success button{ border-color:var(--success); color:var(--success); }
  .error-banner.success button:hover{ background:rgba(61,214,140,0.15); }
</style>
</head>
<body>
<div class="wrap">

  <div class="error-banner" id="errorBanner">
    <div class="eb-head">
      <span id="errorHead">⚠ Something went wrong</span>
      <div class="eb-actions">
        <button id="ebCopy">Copy</button>
        <button id="ebDismiss">Dismiss</button>
      </div>
    </div>
    <div class="eb-msg" id="errorMsg"></div>
  </div>

  <header>
    <div class="brand">
      <div class="brand-mark" id="brandMark">EF</div>
      <div>
        <h1>Trip Computer <span class="version-tag">v1.36.4</span></h1>
        <p id="brandSub">Fuel Efficiency Log — American Truck Simulator</p>
      </div>
    </div>
    <div class="tabbar">
      <button id="tabAts" class="active">ATS · MPG</button>
      <button id="tabEts2">ETS2 · L/100km</button>
    </div>
  </header>

  <!-- KPI STRIP -->
  <div class="kpi-strip" id="kpiStrip"></div>

  <!-- CHART -->
  <div class="panel">
    <div class="panel-header-row">
      <div class="panel-title"><span class="dot"></span>Efficiency Trend</div>
      <div class="header-actions">
        <button class="export-btn" id="importBtn">Import CSV</button>
        <input type="file" id="importFile" accept=".csv,text/csv" style="display:none">
        <button class="export-btn" id="exportBtn">Export CSV</button>
        <button class="clear-btn" id="clearBtn">Reset log</button>
      </div>
    </div>
    <div class="tag-filter-row" id="tagFilterRow"></div>
    <div class="chart-wrap" id="chartWrap"></div>
  </div>

  <!-- FORM + HISTORY -->
  <div class="grid2">
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>Log New Delivery</div>
      <form id="jobForm" novalidate>
        <div class="field">
          <label id="labelDistance">Miles Traveled</label>
          <div class="input-row">
            <input type="number" id="inputDistance" step="any" min="0" placeholder="0.0" inputmode="decimal">
            <span class="suffix" id="suffixDistance">mi</span>
          </div>
        </div>
        <div class="field">
          <label id="labelFuel">Gallons Consumed</label>
          <div class="input-row">
            <input type="number" id="inputFuel" step="any" min="0" placeholder="0.00" inputmode="decimal">
            <span class="suffix" id="suffixFuel">gal</span>
          </div>
        </div>
        <div class="field">
          <label>Truck Model / Trip Tag <span class="optional-tag">optional</span></label>
          <div class="input-row">
            <input type="text" id="inputTag" placeholder="e.g. 49X Heavy" maxlength="40" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label id="labelMass">Cargo Weight <span class="optional-tag">optional</span></label>
          <div class="mass-input-row">
            <input type="number" id="inputMass" step="any" min="0" placeholder="0.0" inputmode="decimal" style="flex:1; padding:11px 13px;">
            <button type="button" id="massUnitToggle" class="mass-unit-toggle">tons</button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Log Job</button>
      </form>
      <div class="preview" id="preview" style="display:none;">
        <span>Calculated</span>
        <span class="big" id="previewVal">—</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><span class="dot"></span>Delivery History</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="footer-note">Data stored locally in this browser · nothing leaves your machine · v1.36.4</div>
</div>

<script>
try{ // ===== TOP-LEVEL SAFETY NET: see catch block at the very bottom of this script =====

/* ---------------- CHANGELOG ----------------
 * v1.0  Initial build: ATS/ETS2 tabs, MPG & L/100km calc, delta badges,
 *       Chart.js trend line, localStorage persistence, gauge-cluster UI.
 * v1.1  Fixed: a Chart.js render failure (e.g. blocked CDN) could throw
 *       before the history log and KPIs rendered, leaving them blank.
 *       Each render step is now isolated so one failure can't cascade.
 * v1.2  Removed a fragile dynamic-script CDN fallback in favor of a
 *       simpler onerror flag; wrapped the submit handler in try/catch
 *       so a job can never fail to log silently; added version tag.
 * v1.3  Added an on-page error banner that catches JS errors and shows
 *       them directly in the UI (with a Copy button) — no dev tools
 *       required to see what went wrong.
 * v1.31 Removed the Chart.js CDN dependency entirely. The trend graph is
 *       now a hand-built inline SVG generated from your own logged data —
 *       zero external requests, so it works fully offline and can no
 *       longer be blocked by a firewall, ad-blocker, or flaky connection.
 * v1.32 Wrapped the entire script in a top-level try/catch. If anything
 *       throws during startup — before the Log Job button's listener is
 *       even attached — it now shows a visible fatal-error box on the
 *       page instead of the app just silently doing nothing.
 * v1.33 Fixed: strict HTML5 "step" validation on the distance/fuel inputs
 *       could silently block form submission for values with more decimal
 *       precision than allowed (e.g. 847.35 mi when step was 0.1), with
 *       only an easy-to-miss native browser tooltip — no console error,
 *       no visible feedback. Native validation is now fully disabled
 *       (novalidate) in favor of explicit JS validation that always shows
 *       a clear on-page message via the error banner.
 * v1.34 Added an "Export CSV" button (next to Reset log) that downloads
 *       every logged ATS and ETS2 job — game, date, distance, fuel, and
 *       calculated efficiency — as a single .csv file, opens cleanly in
 *       Excel/Sheets/Numbers. A local backup independent of the HTML file.
 * v1.35 Made CSV round-trippable: added "Import CSV" next to Export CSV.
 *       Parses quoted fields properly, validates each row, recalculates
 *       efficiency itself rather than trusting the file's numbers, skips
 *       exact duplicates (safe to re-import the same export twice), and
 *       re-sorts each game's log chronologically so delta badges stay
 *       correct after import.
 * v1.36.0 Switched to proper semantic versioning (MAJOR.MINOR.PATCH).
 *       The old ad-hoc scheme (v1.3 → v1.31 → v1.32...) had no consistent
 *       place-value meaning — "v1.4" would sort as numerically less than
 *       "v1.35" if ever compared as a plain decimal, despite coming after
 *       it chronologically. From here: PATCH = bug fixes only, MINOR = new
 *       backward-compatible features, MAJOR = breaking changes (e.g. a
 *       change to the saved data format). Each segment is its own integer,
 *       so ordering stays unambiguous no matter how many releases pile up.
 * v1.36.1 Fleet tagging & filtering. Added an optional "Truck Model / Trip
 *       Tag" field to the logging form (sanitized: newlines stripped,
 *       whitespace collapsed, capped at 40 chars). Added a row of filter
 *       pills above the chart, built from the unique tags in the current
 *       tab's data — clicking one re-renders the KPIs, chart, and history
 *       log against just that filtered subset, including recalculated
 *       delta badges scoped to that truck's own trend. Tag flows through
 *       CSV export/import (new "Truck/Tag" column, backward-compatible
 *       with older files that don't have it). All user-supplied tag text
 *       is HTML/XML-escaped before being injected into the log, filter
 *       pills, or SVG tooltips.
 *       Note: this is a new user-facing feature, which under strict semver
 *       would normally be a MINOR bump — stamped as a PATCH here per an
 *       explicit versioning directive reserving v1.40 for the EV milestone
 *       below.
 * v1.36.2 Optional cargo weight input (tons in ATS, tonnes in ETS2).
 *       When weight is entered, the KPI strip gains a 5th tile showing
 *       average ton-mile or L/100km·t efficiency across weighted jobs in
 *       the current view (including per-filter); the history log shows the
 *       per-job ton-mile figure beneath the main reading; and SVG chart
 *       hover tooltips include the weighted figure. Weight flows through
 *       CSV export (new "Cargo Mass" and "Mass Unit" columns) and import
 *       (backward-compatible with v1.36.0/v1.36.1 files that lack it).
 *       Jobs with no weight entered default to mass=0 and are excluded
 *       from ton-mile calculations without affecting MPG/L-100km data.
 * v1.36.4 ATS cargo weight lbs↔tons toggle. ATS displays cargo weight in
 *       lbs on the delivery screen, so requiring manual /2000 conversion
 *       was unnecessary friction. The mass field now has a clickable
 *       lbs/tons toggle button (ATS only; ETS2 uses tonnes throughout and
 *       its toggle is disabled). Mass is always stored internally in tons
 *       so all ton-mile calculations, KPI averages, and CSV export remain
 *       consistent regardless of the input unit chosen. The toggle resets
 *       to tons on tab switch to prevent unit state bleeding between games.
 * v1.36.4 Submit button hardening. Added a CSS comment documenting the
 *       form layout constraint (no position:absolute on interactive
 *       elements). Added an on-load integrity check using elementFromPoint
 *       that fires the error banner immediately if anything is covering
 *       the button, naming the culprit element. No computed styles were
 *       changed — built from confirmed-working v1.36.3 base.
 *
 * PLANNED (no ETA — blocked on SCS adding charging infrastructure):
 *   Electric truck support — MPGe for ATS (Volvo VNR Electric) and the
 *   metric equivalent (likely kWh/100km or Wh/km) for ETS2 (Scania S BEV,
 *   Renault E-Tech T). Needs the game to actually expose energy consumed
 *   per job once charging is implemented; nothing to calculate from yet.
 *   In the meantime, EVs are only practical on quick jobs within a single
 *   charge: roughly 300-350 km (186-217 mi) depending on truck/load —
 *   log those as normal ATS/ETS2 jobs for now, not as a separate category.
 *   Reserved as v1.40 per current versioning directive.
 * ------------------------------------------- */

/* ---------------- ON-PAGE ERROR/NOTICE REPORTING ---------------- */
function showNotice(message, type){
  // type: 'error' (default) or 'success'
  const banner = document.getElementById('errorBanner');
  const msgEl = document.getElementById('errorMsg');
  const headEl = document.getElementById('errorHead');
  if(!banner || !msgEl) return;
  msgEl.textContent = message;
  banner.classList.toggle('success', type === 'success');
  if(headEl) headEl.textContent = type === 'success' ? '✓ Done' : '⚠ Something went wrong';
  banner.classList.add('show');
}
function showError(message){ showNotice(message, 'error'); }
function showSuccess(message){ showNotice(message, 'success'); }
window.addEventListener('error', function(ev){
  showError((ev.message || 'Unknown error') + (ev.filename ? `\nat ${ev.filename.split('/').pop()}:${ev.lineno}` : ''));
});
window.addEventListener('unhandledrejection', function(ev){
  showError('Unhandled promise rejection: ' + (ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason)));
});
document.addEventListener('DOMContentLoaded', function(){
  const dismissBtn = document.getElementById('ebDismiss');
  const copyBtn = document.getElementById('ebCopy');
  if(dismissBtn) dismissBtn.addEventListener('click', () => {
    document.getElementById('errorBanner').classList.remove('show');
  });
  if(copyBtn) copyBtn.addEventListener('click', () => {
    const text = document.getElementById('errorMsg').textContent;
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
      });
    }
  });
});

const STORAGE_KEY = 'truckFuelTripComputer';
let currentTab = 'ats';

/* ---------------- STORAGE ---------------- */
function loadAll(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { ats: [], ets2: [] };
    const parsed = JSON.parse(raw);
    return { ats: parsed.ats || [], ets2: parsed.ets2 || [] };
  }catch(e){
    return { ats: [], ets2: [] };
  }
}
function saveAll(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let DATA = loadAll();

/* ---------------- HELPERS ---------------- */
function fmt(n, d){
  return Number(n).toFixed(d);
}
function signedFmt(n, d){
  const v = Number(n);
  const s = v > 0 ? '+' : (v < 0 ? '−' : '±');
  return s + fmt(Math.abs(v), d);
}
function deltaBadge(diff, cfg){
  // diff = newEff - oldEff
  if(Math.abs(diff) < 0.0001){
    return { cls:'flat', text:`±0.0 ${cfg.effUnit}` };
  }
  const improved = cfg.higherIsBetter ? diff > 0 : diff < 0;
  const text = `${signedFmt(diff, cfg.effDecimals)} ${cfg.effUnit}`;
  return { cls: improved ? 'up' : 'down', text };
}
function dateLabel(ts){
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------------- FLEET TAG FILTER ---------------- */
let activeFilter = { ats: 'All', ets2: 'All' };

function getUniqueTags(){
  const tags = new Set();
  DATA[currentTab].forEach(e => {
    if(e.tag && e.tag.trim()) tags.add(e.tag.trim());
  });
  return Array.from(tags).sort((a, b) => a.localeCompare(b));
}

function getFilteredEntries(){
  const entries = DATA[currentTab];
  const filter = activeFilter[currentTab];
  if(filter === 'All') return entries;
  return entries.filter(e => (e.tag || '').trim() === filter);
}

function renderTagFilter(){
  const row = document.getElementById('tagFilterRow');
  const tags = getUniqueTags();

  // If the active filter's tag no longer exists (e.g. after a reset/import), fall back to All
  if(activeFilter[currentTab] !== 'All' && !tags.includes(activeFilter[currentTab])){
    activeFilter[currentTab] = 'All';
  }

  if(tags.length === 0){
    row.innerHTML = '';
    return;
  }

  const all = ['All', ...tags];
  row.innerHTML = all.map(t => {
    const active = activeFilter[currentTab] === t ? ' active' : '';
    return `<button class="tag-pill${active}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`;
  }).join('');

  row.querySelectorAll('.tag-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter[currentTab] = btn.getAttribute('data-tag');
      renderAll();
    });
  });
}

/* ---------------- MASS UNIT TOGGLE (declared early: applyTheme needs these) ---------------- */
const massInput = document.getElementById('inputMass');
const massToggle = document.getElementById('massUnitToggle');

// Tracks what unit the user has selected on the ATS mass field.
// Always 'tons' for ETS2 (no toggle available).
// Internal storage is ALWAYS in tons — lbs are converted on submit.
let massInputUnit = 'tons';

massToggle.addEventListener('click', function(){
  if(currentTab !== 'ats') return;
  massInputUnit = massInputUnit === 'tons' ? 'lbs' : 'tons';
  this.textContent = massInputUnit === 'lbs' ? 'lbs' : 'tons';
  this.classList.toggle('lbs-active', massInputUnit === 'lbs');
  massInput.placeholder = massInputUnit === 'lbs' ? '0 (e.g. 80000)' : '0.0';
});

/* ---------------- THEME / TAB SWITCH ---------------- */
function applyTheme(cfg){
  document.documentElement.style.setProperty('--accent', cfg.accent);
  document.documentElement.style.setProperty('--accent-dim', cfg.accentDim);
  document.getElementById('brandMark').textContent = cfg.mark;
  document.getElementById('brandSub').textContent = cfg.sub;
  document.getElementById('labelDistance').textContent = cfg.labelDistance;
  document.getElementById('labelFuel').textContent = cfg.labelFuel;
  document.getElementById('labelMass').innerHTML = `${cfg.labelMass} <span class="optional-tag">optional</span>`;
  document.getElementById('suffixDistance').textContent = cfg.unitDistance;
  document.getElementById('suffixFuel').textContent = cfg.unitFuel;

  // ETS2 only has tonnes — disable the toggle and reset it to tons
  const toggle = document.getElementById('massUnitToggle');
  if(cfg.key === 'ets2'){
    toggle.textContent = 't';
    toggle.disabled = true;
    toggle.classList.remove('lbs-active');
    massInputUnit = 'tons'; // internal: ETS2 uses tonnes (same factor as tons here)
  } else {
    toggle.disabled = false;
    // Restore whatever the user had selected on the ATS tab
    toggle.textContent = massInputUnit === 'lbs' ? 'lbs' : 'tons';
    toggle.classList.toggle('lbs-active', massInputUnit === 'lbs');
  }
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabAts').classList.toggle('active', tab === 'ats');
  document.getElementById('tabEts2').classList.toggle('active', tab === 'ets2');
  applyTheme(CONFIG[tab]);
  document.getElementById('jobForm').reset();
  document.getElementById('preview').style.display = 'none';
  // Reset mass input state on tab switch so lbs mode doesn't bleed across
  if(tab === 'ets2'){
    massInputUnit = 'tons';
  }
  massInput.placeholder = '0.0';
  renderAll();
}

/* ---------------- RENDER: KPI STRIP ---------------- */
function renderKpis(){
  const cfg = CONFIG[currentTab];
  const entries = getFilteredEntries();
  const strip = document.getElementById('kpiStrip');

  if(entries.length === 0){
    strip.innerHTML = `
      <div class="kpi hero">
        <div class="label">Latest Efficiency</div>
        <div class="value-row"><span class="lcd" style="color:var(--text-faint)">— —</span></div>
      </div>
      <div class="kpi"><div class="label">Average</div><div class="value-row"><span class="sub">—</span></div></div>
      <div class="kpi"><div class="label">Total Distance</div><div class="value-row"><span class="sub">—</span></div></div>
      <div class="kpi"><div class="label">Jobs Logged</div><div class="value-row"><span class="sub">0</span></div></div>
    `;
    return;
  }

  const latest = entries[entries.length - 1];
  const avgEff = entries.reduce((s,e) => s + e.eff, 0) / entries.length;
  const totalDist = entries.reduce((s,e) => s + e.distance, 0);

  let badgeHtml = '';
  if(entries.length > 1){
    const prev = entries[entries.length - 2];
    const diff = latest.eff - prev.eff;
    const b = deltaBadge(diff, cfg);
    badgeHtml = `<span class="badge ${b.cls}">${b.text}</span>`;
  }

  // Ton-mile / tonne-km KPI: only shown when at least one job in the filtered
  // set has a logged cargo mass > 0
  const weightedEntries = entries.filter(e => e.mass > 0);
  let tonKpiHtml = '';
  if(weightedEntries.length > 0){
    const avgTon = weightedEntries.reduce((s,e) => s + cfg.calcTon(e.distance, e.fuel, e.mass), 0) / weightedEntries.length;
    const latestWithMass = weightedEntries[weightedEntries.length - 1];
    const latestTon = cfg.calcTon(latestWithMass.distance, latestWithMass.fuel, latestWithMass.mass);
    tonKpiHtml = `
    <div class="kpi">
      <div class="label">Avg ${cfg.tonUnit}</div>
      <div class="value-row">
        <span class="sub">${fmt(avgTon, cfg.tonDecimals)}</span>
        <span class="unit">${cfg.tonUnit}</span>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);margin-top:4px;">latest ${fmt(latestTon, cfg.tonDecimals)} · ${weightedEntries.length} weighted job${weightedEntries.length === 1 ? '' : 's'}</div>
    </div>`;
  }

  // Adjust grid columns dynamically based on whether ton-mile KPI is present
  strip.style.gridTemplateColumns = weightedEntries.length > 0
    ? '1.2fr 1fr 1fr 1fr 1fr'
    : '1.3fr 1fr 1fr 1fr';

  strip.innerHTML = `
    <div class="kpi hero">
      <div class="label">Latest Efficiency</div>
      <div class="value-row">
        <span class="lcd">${fmt(latest.eff, cfg.effDecimals)}</span>
        <span class="unit">${cfg.effUnit}</span>
        ${badgeHtml}
      </div>
    </div>
    <div class="kpi">
      <div class="label">Average</div>
      <div class="value-row"><span class="sub">${fmt(avgEff, cfg.effDecimals)}</span><span class="unit">${cfg.effUnit}</span></div>
    </div>
    <div class="kpi">
      <div class="label">Total Distance</div>
      <div class="value-row"><span class="sub">${fmt(totalDist, 0)}</span><span class="unit">${cfg.unitDistance}</span></div>
    </div>
    <div class="kpi">
      <div class="label">Jobs Logged</div>
      <div class="value-row"><span class="sub">${entries.length}</span></div>
    </div>
    ${tonKpiHtml}
  `;
}

/* ---------------- RENDER: CHART (self-contained SVG, no external library) ---------------- */
function buildTrendSVG(entries, cfg){
  const width = 900, height = 260;
  const padL = 50, padR = 16, padT = 16, padB = 34;
  const w = width - padL - padR;
  const h = height - padT - padB;
  const n = entries.length;

  const values = entries.map(e => e.eff);
  let min = Math.min(...values);
  let max = Math.max(...values);
  if(min === max){ min -= 1; max += 1; }
  const range = max - min;
  min -= range * 0.15;
  max += range * 0.15;

  const xStep = n > 1 ? w / (n - 1) : 0;
  const points = entries.map((e, i) => ({
    x: padL + (n > 1 ? i * xStep : w / 2),
    y: padT + h - ((e.eff - min) / (max - min)) * h,
    eff: e.eff,
    ts: e.ts,
    tag: e.tag || '',
    mass: e.mass || 0,
    idx: i
  }));

  // horizontal grid lines + y-axis labels
  const gridCount = 4;
  let gridLines = '', gridLabels = '';
  for(let gi = 0; gi <= gridCount; gi++){
    const y = padT + (h / gridCount) * gi;
    const val = max - (max - min) * (gi / gridCount);
    gridLines += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL + w}" y2="${y.toFixed(1)}" stroke="#20252c" stroke-width="1"/>`;
    gridLabels += `<text x="${padL - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#7d8794">${fmt(val, cfg.effDecimals)}</text>`;
  }

  // x-axis labels (thinned out to avoid crowding)
  const maxLabels = 7;
  const labelStep = Math.max(1, Math.ceil(n / maxLabels));
  let xLabels = '';
  points.forEach((p, i) => {
    if(i % labelStep === 0 || i === n - 1){
      xLabels += `<text x="${p.x.toFixed(1)}" y="${(padT + h + 20).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7d8794">#${i + 1}</text>`;
    }
  });

  const lineD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ');
  const baseline = (padT + h).toFixed(1);
  const areaD = `${lineD} L ${points[n-1].x.toFixed(1)} ${baseline} L ${points[0].x.toFixed(1)} ${baseline} Z`;

  let circles = '';
  points.forEach(p => {
    const tonPart = p.mass > 0 ? ` · ${fmt(cfg.calcTon(entries[p.idx].distance, entries[p.idx].fuel, p.mass), cfg.tonDecimals)} ${cfg.tonUnit}` : '';
    const label = `Job #${p.idx + 1} · ${fmt(p.eff, cfg.effDecimals)} ${cfg.effUnit} · ${dateLabel(p.ts)}` + (p.tag ? ` · ${p.tag}` : '') + tonPart;
    circles += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="#0a0c0f" stroke="${cfg.accent}" stroke-width="2.5"><title>${escapeHtml(label)}</title></circle>`;
  });

  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Efficiency trend chart">
      <defs>
        <linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${cfg.accent}" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="${cfg.accent}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${gridLabels}
      <path d="${areaD}" fill="url(#trendFill)" stroke="none"/>
      <path d="${lineD}" fill="none" stroke="${cfg.accent}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${circles}
      ${xLabels}
    </svg>`;
}

function renderChart(){
  const cfg = CONFIG[currentTab];
  const entries = getFilteredEntries();
  const wrap = document.getElementById('chartWrap');

  if(entries.length === 0){
    const filtered = activeFilter[currentTab] !== 'All';
    wrap.innerHTML = `
      <div class="empty-state">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/>
        </svg>
        <span>${filtered ? 'No jobs match this filter' : 'No jobs logged yet'}</span>
      </div>`;
    return;
  }

  wrap.innerHTML = buildTrendSVG(entries, cfg);
}

/* ---------------- RENDER: HISTORY LOG ---------------- */
function renderLog(){
  const cfg = CONFIG[currentTab];
  const entries = getFilteredEntries();
  const log = document.getElementById('log');

  if(entries.length === 0){
    const filtered = activeFilter[currentTab] !== 'All';
    log.innerHTML = `<div class="log-empty">${filtered ? 'No deliveries match this filter' : 'No deliveries logged for this game yet'}</div>`;
    return;
  }

  let html = '';
  for(let i = entries.length - 1; i >= 0; i--){
    const e = entries[i];
    let badgeHtml = '<span class="badge flat" style="opacity:0.5">FIRST</span>';
    if(i > 0){
      const prev = entries[i-1];
      const diff = e.eff - prev.eff;
      const b = deltaBadge(diff, cfg);
      badgeHtml = `<span class="badge ${b.cls}">${b.text}</span>`;
    }
    const tagHtml = e.tag ? `<span class="log-tag">${escapeHtml(e.tag)}</span>` : '';
    const massHtml = e.mass > 0
      ? `<span class="log-tag" style="color:var(--text-dim);">${fmt(e.mass, 2)} ${currentTab === 'ats' ? 'tons' : 't'}</span>`
      : '';
    const tonHtml = e.mass > 0
      ? `<div class="log-ton">${fmt(cfg.calcTon(e.distance, e.fuel, e.mass), cfg.tonDecimals)} <span style="color:var(--text-faint);font-size:10px;">${cfg.tonUnit}</span></div>`
      : '';
    html += `
      <div class="log-row">
        <div class="idx">JOB #${i+1}</div>
        <div class="raw">${fmt(e.distance,1)} ${cfg.unitDistance} · ${fmt(e.fuel,2)} ${cfg.unitFuel}${tagHtml}${massHtml}</div>
        <div class="eff">
          ${fmt(e.eff, cfg.effDecimals)} <span style="color:var(--text-faint); font-size:12px;">${cfg.effUnit}</span>
          ${tonHtml}
        </div>
        ${badgeHtml}
      </div>`;
  }
  log.innerHTML = html;
}

function renderAll(){
  // Each render function is isolated so a failure in one can never block the others.
  try{ renderTagFilter(); }catch(e){ console.error('Tag filter render failed:', e); }
  try{ renderKpis(); }catch(e){ console.error('KPI render failed:', e); showError('KPI render failed: ' + e.message); }
  try{ renderLog(); }catch(e){ console.error('Log render failed:', e); showError('Log render failed: ' + e.message); }
  try{ renderChart(); }catch(e){
    console.error('Chart render failed:', e);
    showError('Chart render failed: ' + e.message);
    const wrap = document.getElementById('chartWrap');
    if(wrap){
      wrap.innerHTML = `
        <div class="empty-state">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          </svg>
          <span>Chart couldn't render — try reloading the page</span>
        </div>`;
    }
  }
}

/* ---------------- FORM SUBMIT ---------------- */
const distInput = document.getElementById('inputDistance');
const fuelInput = document.getElementById('inputFuel');
const tagInput = document.getElementById('inputTag');
const preview = document.getElementById('preview');
const previewVal = document.getElementById('previewVal');

function sanitizeTag(raw){
  // Strip newlines/control chars and collapse whitespace so it stays a clean
  // single-line value for display, CSV export, and filter-pill matching.
  return String(raw || '')
    .replace(/[\r\n\t]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 40);
}

function updatePreview(){
  const cfg = CONFIG[currentTab];
  const d = parseFloat(distInput.value);
  const f = parseFloat(fuelInput.value);
  if(!isNaN(d) && !isNaN(f) && f > 0 && d >= 0){
    const eff = cfg.calc(d, f);
    previewVal.textContent = `${fmt(eff, cfg.effDecimals)} ${cfg.effUnit}`;
    preview.style.display = 'flex';
  } else {
    preview.style.display = 'none';
  }
}
distInput.addEventListener('input', updatePreview);
fuelInput.addEventListener('input', updatePreview);

document.getElementById('jobForm').addEventListener('submit', function(ev){
  ev.preventDefault();
  try{
    const cfg = CONFIG[currentTab];
    const distance = parseFloat(distInput.value);
    const fuel = parseFloat(fuelInput.value);
    const tag = sanitizeTag(tagInput.value);
    // Mass is optional: parse only if something was entered, default to 0.
    // If the user has the toggle set to lbs, convert to tons for storage
    // (all internal calculations and CSV export use tons/tonnes).
    const massRaw = massInput.value.trim();
    const massEntered = massRaw !== '' ? parseFloat(massRaw) : 0;
    const mass = (massRaw !== '' && massInputUnit === 'lbs') ? massEntered / 2000 : massEntered;

    if(distInput.value.trim() === '' || fuelInput.value.trim() === ''){
      showError('Please fill in both fields before logging a job.');
      return;
    }
    if(isNaN(distance) || isNaN(fuel)){
      showError('Distance and fuel must be numbers.');
      return;
    }
    if(fuel <= 0){
      showError('Fuel consumed must be greater than zero.');
      return;
    }
    if(distance < 0){
      showError('Distance traveled can\'t be negative.');
      return;
    }
    if(massRaw !== '' && (isNaN(massEntered) || massEntered < 0)){
      showError('Cargo weight must be a positive number, or leave it blank.');
      return;
    }

    const eff = cfg.calc(distance, fuel);
    DATA[currentTab].push({ ts: Date.now(), distance, fuel, eff, tag, mass });
    saveAll(DATA);

    this.reset();
    preview.style.display = 'none';
    renderAll();
  }catch(err){
    console.error('Failed to log job:', err);
    showError('Failed to log job: ' + err.message);
  }
});

/* ---------------- EXPORT CSV ---------------- */
function csvEscape(val){
  const s = String(val);
  if(/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportCSV(){
  const totalJobs = DATA.ats.length + DATA.ets2.length;
  if(totalJobs === 0){
    showError('No jobs logged yet — nothing to export.');
    return;
  }

  const header = ['Game', 'Job #', 'Date', 'Distance', 'Distance Unit', 'Fuel/Energy', 'Fuel Unit', 'Efficiency', 'Efficiency Unit', 'Truck/Tag', 'Cargo Mass', 'Mass Unit'];
  const rows = [header];

  ['ats', 'ets2'].forEach(key => {
    const cfg = CONFIG[key];
    const gameLabel = key === 'ats' ? 'ATS' : 'ETS2';
    DATA[key].forEach((e, i) => {
      rows.push([
        gameLabel,
        i + 1,
        new Date(e.ts).toISOString(),
        e.distance,
        cfg.unitDistance,
        e.fuel,
        cfg.unitFuel,
        fmt(e.eff, cfg.effDecimals),
        cfg.effUnit,
        e.tag || '',
        e.mass > 0 ? e.mass : '',
        e.mass > 0 ? cfg.unitMass : ''
      ]);
    });
  });

  const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `trip-computer-fuel-log-${dateStamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------------- IMPORT CSV ---------------- */
// Minimal RFC4180-ish CSV parser: handles quoted fields, escaped "" quotes,
// commas inside quotes, and both \r\n and \n line endings.
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else{ inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\r'){ /* skip, \n handles the line break */ }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  // last field/row if the file doesn't end with a newline
  if(field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
}

function importCSV(text){
  const rows = parseCSV(text);
  if(rows.length < 2){
    showError('That CSV has no data rows to import.');
    return;
  }

  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = {
    game: header.indexOf('game'),
    date: header.indexOf('date'),
    distance: header.indexOf('distance'),
    fuel: header.indexOf('fuel/energy'),
    tag: header.indexOf('truck/tag'),    // -1 on pre-v1.36.1 exports
    mass: header.indexOf('cargo mass')  // -1 on pre-v1.36.2 exports
  };
  if(idx.game === -1 || idx.distance === -1 || idx.fuel === -1){
    showError('CSV is missing required columns (Game, Distance, Fuel/Energy). Make sure you\'re importing a file exported from this app.');
    return;
  }

  let added = 0, duplicates = 0, invalid = 0;
  for(let r = 1; r < rows.length; r++){
    const cols = rows[r];
    if(cols.length < 2) continue;

    const gameRaw = (cols[idx.game] || '').trim().toLowerCase();
    const key = gameRaw === 'ats' ? 'ats' : (gameRaw === 'ets2' ? 'ets2' : null);
    if(!key){ invalid++; continue; }

    const cfg = CONFIG[key];
    const distance = parseFloat(cols[idx.distance]);
    const fuel = parseFloat(cols[idx.fuel]);
    if(isNaN(distance) || isNaN(fuel) || fuel <= 0 || distance < 0){ invalid++; continue; }

    let ts = idx.date !== -1 ? Date.parse(cols[idx.date]) : NaN;
    if(isNaN(ts)) ts = Date.now();

    const tag = idx.tag !== -1 ? sanitizeTag(cols[idx.tag]) : '';
    const massRaw = idx.mass !== -1 ? (cols[idx.mass] || '').trim() : '';
    const mass = massRaw !== '' ? parseFloat(massRaw) : 0;

    // Dedup: skip if an entry with the same timestamp + distance + fuel already exists
    const isDup = DATA[key].some(e => e.ts === ts && e.distance === distance && e.fuel === fuel);
    if(isDup){ duplicates++; continue; }

    // Always recompute efficiency ourselves rather than trusting the file's value
    const eff = cfg.calc(distance, fuel);
    DATA[key].push({ ts, distance, fuel, eff, tag, mass: isNaN(mass) ? 0 : mass });
    added++;
  }

  // Keep each game's log in chronological order so delta badges stay meaningful
  DATA.ats.sort((a, b) => a.ts - b.ts);
  DATA.ets2.sort((a, b) => a.ts - b.ts);
  saveAll(DATA);
  renderAll();

  if(added === 0 && duplicates === 0 && invalid === 0){
    showError('No valid rows found in that file.');
  } else {
    const parts = [`${added} job${added === 1 ? '' : 's'} imported`];
    if(duplicates > 0) parts.push(`${duplicates} duplicate${duplicates === 1 ? '' : 's'} skipped`);
    if(invalid > 0) parts.push(`${invalid} invalid row${invalid === 1 ? '' : 's'} skipped`);
    showSuccess(parts.join(' · '));
  }
}

document.getElementById('importBtn').addEventListener('click', function(){
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', function(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      importCSV(e.target.result);
    }catch(err){
      console.error('CSV import failed:', err);
      showError('CSV import failed: ' + err.message);
    }
  };
  reader.onerror = function(){
    showError('Could not read that file.');
  };
  reader.readAsText(file);
  ev.target.value = ''; // allow re-selecting the same file later
});

document.getElementById('clearBtn').addEventListener('click', function(){

  DATA[currentTab] = [];
  saveAll(DATA);
  renderAll();
});

/* ---------------- SUBMIT BUTTON INTEGRITY CHECK (v1.36.4) ---------------- */
// Runs after layout settles. Scrolls the button into view temporarily to
// get an accurate elementFromPoint reading regardless of initial scroll pos.
setTimeout(function(){
  try{
    const btn = document.getElementById('submitBtn');
    if(!btn) return;
    btn.scrollIntoView({ block: 'center' });
    // Let the scroll settle before sampling
    setTimeout(function(){
      try{
        const rect = btn.getBoundingClientRect();
        const cx = Math.round(rect.left + rect.width / 2);
        const cy = Math.round(rect.top + rect.height / 2);
        const topEl = document.elementFromPoint(cx, cy);
        if(!topEl) return;
        if(topEl !== btn && !btn.contains(topEl)){
          const culprit = topEl.id ? '#' + topEl.id
            : topEl.className ? '.' + String(topEl.className).trim().split(/\s+/)[0]
            : topEl.tagName;
          showError('⚠ Layout warning: the Log Job button is covered by ' + culprit + ' — this is the known cause of "button does nothing." Please report this.');
        }
        // Scroll back to top after check
        window.scrollTo(0, 0);
      }catch(e){ showError('Integrity check inner error: ' + e.message); }
    }, 150);
  }catch(e){ showError('Integrity check error: ' + e.message); }
}, 400);

} catch(fatalErr){
  // Maximum-defensiveness fallback: if ANYTHING above threw before the app
  // could initialize (which would otherwise fail totally silently), show it
  // directly on the page without depending on any other function existing.
  console.error('Fatal init error:', fatalErr);
  const box = document.createElement('div');
  box.style.cssText = 'max-width:1080px;margin:20px auto;padding:16px 18px;background:rgba(229,72,77,0.12);border:1px solid #e5484d;border-radius:10px;color:#ffb3b5;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;';
  box.textContent = 'FATAL ERROR — the app failed to start:\n\n' + (fatalErr && fatalErr.stack ? fatalErr.stack : String(fatalErr));
  document.body.insertBefore(box, document.body.firstChild);
}
